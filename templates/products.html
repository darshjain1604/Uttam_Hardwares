<!DOCTYPE html>
<html>
<head>
  <title>Products</title>
</head>
<body>

<h1>All Products</h1>

{% if products %}
  {% for p in products %}
    <div>
      <h3>{{ p.name }}</h3>
      <p>Price: ₹{{ p.price }}</p>
      <p>Unit: {{ p.unit }}</p>
      <a href="/product/{{ p.id }}">View</a>
    </div>
    <hr>
  {% endfor %}
{% else %}
  <p>No products available</p>
{% endif %}

</body>
</html>
