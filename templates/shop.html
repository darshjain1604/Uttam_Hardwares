<!DOCTYPE html>
<html>
<head>
  <title>Shop</title>

  <style>
    body { font-family: Arial; background:#eef2f7; }

    h1 { text-align:center; }

    .top {
      text-align:center;
      margin:20px;
    }

    input {
      padding:10px;
      width:250px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    .container {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card {
      background:white;
      width:250px;
      margin:15px;
      padding:15px;
      border-radius:12px;
      box-shadow:0px 4px 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    img {
      width:120px;
      height:120px;
      object-fit:cover;
      border-radius:10px;
    }

    input.qty {
      width:60px;
      padding:6px;
      margin-top:10px;
    }

    button {
      margin-top:10px;
      padding:8px 15px;
      background:green;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
  </style>

  <script>
    function searchProducts() {
      let input = document.getElementById("search").value.toLowerCase();
      let cards = document.getElementsByClassName("card");

      for (let i = 0; i < cards.length; i++) {
        let name = cards[i].getElementsByTagName("h3")[0].innerText.toLowerCase();

        if (name.includes(input)) {
          cards[i].style.display = "block";
        } else {
          cards[i].style.display = "none";
        }
      }
    }
  </script>

</head>

<body>

<h1>🛒 Shop Products</h1>

<div class="top">
  <input type="text" id="search" onkeyup="searchProducts()" placeholder="🔍 Search product...">
</div>

<div class="container">

{% for p in products %}
  <div class="card">

    <img src="{{ p.image }}">

    <h3>{{ p.name }}</h3>
    <p>₹{{ p.price }}</p>

    <!-- ADD TO CART -->
    <form action="/add_to_cart/{{ p.id }}" method="POST">
      <input type="number" name="qty" value="1" min="1" class="qty">
      <br>
      <button>Add</button>
    </form>

  </div>
{% endfor %}

</div>

</body>
</html>
