<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>

  <style>
    body { font-family: Arial; background:#eef2f7; }

    h1 { text-align:center; }

    table {
      width:80%;
      margin:30px auto;
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0px 4px 10px rgba(0,0,0,0.1);
    }

    th, td {
      padding:12px;
      text-align:center;
    }

    th {
      background:#2c3e50;
      color:white;
    }

    img {
      width:50px;
      height:50px;
      border-radius:6px;
    }

    .btns {
      text-align:center;
      margin-top:20px;
    }

    button {
      padding:12px 20px;
      margin:10px;
      border:none;
      border-radius:6px;
      color:white;
      cursor:pointer;
    }

    .done { background:green; }
    .clear { background:red; }
  </style>
</head>

<body>

<h1>🛒 Cart</h1>

{% if cart %}

<table>
<tr>
<th>Image</th>
<th>Name</th>
<th>Qty</th>
<th>Total</th>
</tr>

{% set total = 0 %}

{% for item in cart %}
<tr>
<td><img src="{{ item.image }}"></td>
<td>{{ item.name }}</td>
<td>{{ item.qty }}</td>
<td>₹{{ item.price * item.qty }}</td>
</tr>

{% set total = total + (item.price * item.qty) %}
{% endfor %}
</table>

<h2 style="text-align:center;">Total: ₹{{ total }}</h2>

<div class="btns">
<a href="/export_excel"><button class="done">DONE</button></a>
<a href="/clear"><button class="clear">CLEAR</button></a>
</div>

{% else %}
<p style="text-align:center;">Cart Empty</p>
{% endif %}

</body>
</html>
