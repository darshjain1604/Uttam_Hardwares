<h1>Cart</h1>

{% if cart %}
<table border="1">
<tr>
<th>Name</th><th>Qty</th><th>Total</th>
</tr>

{% for item in cart %}
<tr>
<td>{{ item.name }}</td>
<td>{{ item.qty }}</td>
<td>{{ item.price * item.qty }}</td>
</tr>
{% endfor %}
</table>

<br>
<a href="/export_excel"><button>DONE</button></a>
<a href="/clear"><button>Clear</button></a>

{% else %}
<p>Cart is empty</p>
{% endif %}
